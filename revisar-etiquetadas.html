<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisar Imágenes Etiquetadas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header con información del usuario y botón de logout -->
    <div class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-2 lg:gap-0">
            <div class="flex items-center space-x-4 text-center lg:text-left">
                <h1 class="text-sm lg:text-lg xl:text-xl font-bold text-blue-900 leading-tight">REVISAR IMÁGENES ETIQUETADAS</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span id="user-info" class="text-xs lg:text-sm text-gray-600"></span>
                <a href="index.html" class="px-3 lg:px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-xs lg:text-sm font-medium transition duration-200">
                    Etiquetar
                </a>
                <a href="cambiar-etiquetas.html" class="px-3 lg:px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-md text-xs lg:text-sm font-medium transition duration-200">
                    Reetiquetar
                </a>
                <button id="logout-btn" class="px-3 lg:px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md text-xs lg:text-sm font-medium transition duration-200">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 mt-6 lg:mt-10">
        <!-- Selectores -->
        <div class="bg-white p-4 lg:p-6 rounded-lg shadow-md flex flex-col lg:flex-row gap-4 lg:gap-8 items-start lg:items-end">
            <div class="w-full lg:w-auto">
                <label for="select-drone" class="block mb-1 text-gray-700 font-semibold text-sm lg:text-base">Selecciona el drone:</label>
                <select id="select-drone" class="px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm lg:text-base w-full lg:w-56">
                    <option value="" selected disabled>Selecciona un drone</option>
                    <option value="DRONE_0">DRONE_0</option>
                    <option value="DRONE_1">DRONE_1</option>
                    <option value="DRONE_2">DRONE_2</option>
                    <option value="DRONE_3">DRONE_3</option>
                    <option value="DRONE_4">DRONE_4</option>
                </select>
            </div>
            <div class="w-full lg:w-auto">
                <label for="select-imagen-completa" class="block mb-1 text-gray-700 font-semibold text-sm lg:text-base">Imagen completa:</label>
                <select id="select-imagen-completa" class="px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm lg:text-base w-full lg:w-72" disabled>
                    <option value="" selected disabled>Selecciona un drone primero</option>
                </select>
            </div>
            <div id="resumen" class="text-blue-700 font-semibold text-sm lg:text-base lg:ml-auto"></div>
        </div>

        <!-- Mensajes de estado -->
        <div id="mensaje" class="hidden mt-6 p-4 rounded bg-yellow-100 border border-yellow-400 text-yellow-800 text-sm lg:text-base"></div>

        <!-- Lista de recortes etiquetados -->
        <div id="lista-etiquetadas" class="mt-6 mb-12 space-y-3"></div>
    </div>

<script>
// Verificar autenticación (mismo criterio que index.html)
function checkAuth() {
    const isAuthenticated = sessionStorage.getItem('isAuthenticated');
    const user = sessionStorage.getItem('user');

    if (!isAuthenticated || !user) {
        window.location.href = 'login.html';
        return false;
    }

    const userInfo = JSON.parse(user);
    document.getElementById('user-info').textContent = `Usuario: ${userInfo.username} (${userInfo.role})`;
    return true;
}

async function logout() {
    try {
        await fetch('logout.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
    } catch (error) {
        console.error('Error al cerrar sesión:', error);
    } finally {
        sessionStorage.removeItem('isAuthenticated');
        sessionStorage.removeItem('user');
        window.location.href = 'login.html';
    }
}

if (!checkAuth()) {
    throw new Error('No autenticado');
}

// BASE_URL ya está definido en config.js
const API = BASE_URL + '/api.php';

let droneSeleccionado = '';

const selectDrone = document.getElementById('select-drone');
const selectImagen = document.getElementById('select-imagen-completa');
const listaDiv = document.getElementById('lista-etiquetadas');
const mensajeDiv = document.getElementById('mensaje');
const resumenDiv = document.getElementById('resumen');

function mostrarMensaje(texto) {
    mensajeDiv.textContent = texto;
    mensajeDiv.classList.remove('hidden');
}

function ocultarMensaje() {
    mensajeDiv.classList.add('hidden');
}

// Pide al servidor las imágenes completas del drone que ya tienen recortes etiquetados
async function cargarImagenesCompletas(drone) {
    selectImagen.disabled = true;
    selectImagen.innerHTML = '<option value="" selected disabled>Cargando...</option>';
    listaDiv.innerHTML = '';
    resumenDiv.textContent = '';
    ocultarMensaje();

    try {
        const resp = await fetch(`${API}?originales_etiquetadas=1&drone=${encodeURIComponent(drone)}`);
        const texto = await resp.text();
        let data;
        try {
            data = JSON.parse(texto);
        } catch (e) {
            throw new Error(`HTTP ${resp.status} — respuesta no JSON:\n${texto.slice(0, 500)}`);
        }
        if (!resp.ok || data.status === 'error') {
            throw new Error(data.msg || `HTTP ${resp.status}`);
        }

        const originales = data.originales || [];
        if (originales.length === 0) {
            selectImagen.innerHTML = '<option value="" selected disabled>Sin imágenes etiquetadas</option>';
            mostrarMensaje(`El drone ${drone} todavía no tiene recortes etiquetados.`);
            return;
        }

        selectImagen.innerHTML = '<option value="" selected disabled>Selecciona una imagen</option>';
        let total = 0;
        originales.forEach(o => {
            total += o.cantidad;
            const option = document.createElement('option');
            option.value = o.imagen_original;
            option.textContent = `${o.imagen_original} (${o.cantidad} etiquetadas)`;
            selectImagen.appendChild(option);
        });
        selectImagen.disabled = false;
        resumenDiv.textContent = `${originales.length} imágenes completas · ${total} recortes etiquetados`;
    } catch (err) {
        console.error('cargarImagenesCompletas:', err);
        selectImagen.innerHTML = '<option value="" selected disabled>Error al cargar</option>';
        mostrarMensaje('Error al cargar las imágenes completas: ' + err.message);
    }
}

// Pide y dibuja los recortes etiquetados de una imagen completa
async function cargarRecortesEtiquetados(drone, imagenOriginal) {
    listaDiv.innerHTML = '<p class="text-gray-500 text-sm">Cargando recortes...</p>';
    ocultarMensaje();

    try {
        const url = `${API}?etiquetadas=1&drone=${encodeURIComponent(drone)}&imagen_original=${encodeURIComponent(imagenOriginal)}`;
        const resp = await fetch(url);
        const texto = await resp.text();
        let data;
        try {
            data = JSON.parse(texto);
        } catch (e) {
            throw new Error(`HTTP ${resp.status} — respuesta no JSON:\n${texto.slice(0, 500)}`);
        }
        if (!resp.ok || data.status === 'error') {
            throw new Error(data.msg || `HTTP ${resp.status}`);
        }

        renderizarRecortes(data.registros || []);
    } catch (err) {
        console.error('cargarRecortesEtiquetados:', err);
        listaDiv.innerHTML = '';
        mostrarMensaje('Error al cargar los recortes: ' + err.message);
    }
}

// Crea una "píldora" de color para una etiqueta
function crearPildora(texto, clases) {
    const span = document.createElement('span');
    span.className = `inline-block px-2 py-1 rounded text-xs font-semibold ${clases}`;
    span.textContent = texto;
    return span;
}

function renderizarRecortes(registros) {
    listaDiv.innerHTML = '';

    if (registros.length === 0) {
        mostrarMensaje('Esta imagen no tiene recortes etiquetados.');
        return;
    }

    registros.forEach(reg => {
        const fila = document.createElement('div');
        fila.className = 'bg-white p-3 lg:p-4 rounded-lg shadow-sm flex flex-col sm:flex-row gap-4 items-start';

        // Recorte al costado
        const img = document.createElement('img');
        img.src = BASE_URL + reg.path_imagen;
        img.alt = reg.nombre_imagen;
        img.loading = 'lazy';
        img.className = 'w-32 h-32 object-contain bg-gray-100 border border-gray-200 rounded flex-shrink-0';
        img.onerror = function () {
            this.classList.add('hidden');
            const aviso = document.createElement('div');
            aviso.className = 'w-32 h-32 flex items-center justify-center bg-gray-100 border border-gray-200 rounded text-gray-400 text-xs text-center flex-shrink-0';
            aviso.textContent = 'Recorte no disponible';
            fila.insertBefore(aviso, fila.firstChild);
        };
        fila.appendChild(img);

        // Datos de la etiqueta
        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const nombre = document.createElement('p');
        nombre.className = 'font-semibold text-gray-800 text-sm break-all mb-2';
        nombre.textContent = reg.nombre_imagen;
        info.appendChild(nombre);

        const etiquetas = document.createElement('div');
        etiquetas.className = 'flex flex-wrap gap-1 mb-2';

        // Etiqueta(s) principal(es): se guardan separadas por coma
        (reg.etiqueta_principal || '').split(',')
            .map(e => e.trim())
            .filter(Boolean)
            .forEach(e => etiquetas.appendChild(crearPildora(e, 'bg-blue-100 text-blue-800')));

        // Etiquetas secundarias
        (reg.etiquetas_secundarias || '').split(',')
            .map(e => e.trim())
            .filter(Boolean)
            .forEach(e => etiquetas.appendChild(crearPildora(e, 'bg-gray-100 text-gray-700')));

        if (etiquetas.childElementCount === 0) {
            etiquetas.appendChild(crearPildora('Sin etiqueta', 'bg-red-100 text-red-700'));
        }
        info.appendChild(etiquetas);

        const meta = document.createElement('p');
        meta.className = 'text-xs text-gray-500';
        const coords = (reg.x_imagen !== null && reg.y_imagen !== null)
            ? ` · x: ${reg.x_imagen}, y: ${reg.y_imagen}`
            : '';
        meta.textContent = `${reg.usuario} · ${reg.fecha}${coords}`;
        info.appendChild(meta);

        fila.appendChild(info);
        listaDiv.appendChild(fila);
    });
}

selectDrone.addEventListener('change', function () {
    droneSeleccionado = this.value;
    cargarImagenesCompletas(droneSeleccionado);
});

selectImagen.addEventListener('change', function () {
    if (this.value) {
        cargarRecortesEtiquetados(droneSeleccionado, this.value);
    }
});

document.getElementById('logout-btn').addEventListener('click', logout);
</script>
</body>
</html>
